<!-- Arquivo: favicon.svg | Função: Favicon Base (Prancheta super expandida contra Clipping) -->
<!-- ViewBox de 70 a 360 gera uma "margem blindada" gigantesca em todos os eixos. O N nunca mais toca as bordas. -->
<svg viewBox="70 70 360 360" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f02bd4" /> 
            <stop offset="50%" stop-color="#8b5cf6" /> 
            <stop offset="100%" stop-color="#00d4ff" /> 
        </linearGradient>
        <filter id="microGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="glow1" />
            <feMerge><feMergeNode in="glow1" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    <g filter="url(#microGlow)">
        <!-- O stroke-width="75" agora tem espaço livre pra respirar dentro da caixa -->
        <path d="M 160 360 L 160 140 L 340 360 L 340 225 M 340 139 L 340 141" fill="none" stroke="url(#neonGrad)" stroke-width="75" stroke-linecap="round" stroke-linejoin="round" />
    </g>
</svg>
