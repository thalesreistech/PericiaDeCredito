<!-- Arquivo: nexa_logo_horizontal_cmyk.svg | Função: Impressão Colorida Segura (S/ Efeitos de Luz) -->
<svg viewBox="0 0 451 130" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradiente ajustado para simular tinta no papel, sem luz -->
        <linearGradient id="cmykGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D81B60" /> 
            <stop offset="50%" stop-color="#673AB7" /> 
            <stop offset="100%" stop-color="#0097A7" /> 
        </linearGradient>
    </defs>

    <svg x="0" y="5" width="120" height="120" viewBox="0 0 500 500">
        <g fill="none" stroke="url(#cmykGrad)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round">
            <path d="M 160 360 L 160 140 L 340 360 L 340 225" />
        </g>
        <!-- Ponto convertido em círculo físico para CNC/Corte -->
        <circle cx="340" cy="140" r="35" fill="url(#cmykGrad)" />
    </svg>

    <g transform="translate(130, 13) scale(1.3)" fill="#1A1A1A">
        <!-- Texto Escuro Sólido -->
        <path d="M 0,60 L 0,20 L 12,20 L 36,50 L 36,20 L 48,20 L 48,60 L 36,60 L 12,30 L 12,60 Z" />
        <path d="M 68,60 L 68,20 L 103,20 L 103,29 L 81,29 L 81,35 L 99,35 L 99,44 L 81,44 L 81,51 L 103,51 L 103,60 Z" />
        <path d="M 118,20 L 132,20 L 158,60 L 144,60 Z" />
        <!-- Perna do X Colorida CMYK -->
        <path d="M 118,60 L 132,60 L 158,20 L 144,20 Z" fill="url(#cmykGrad)" />
        <path d="M 186,20 L 200,20 L 224,60 L 209,60 L 193,31 L 177,60 L 162,60 Z" />
    </g>
</svg>
