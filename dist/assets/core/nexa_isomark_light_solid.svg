<!-- Arquivo: nexa_isomark_light_solid.svg | Função: Ícone Oficial (Fundo Claro Sólido) -->
<svg viewBox="50 50 400 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <rect x="50" y="50" width="400" height="400" fill="#FFFFFF" />
    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f02bd4" /> <stop offset="50%" stop-color="#8b5cf6" /> <stop offset="100%" stop-color="#00d4ff" /> 
        </linearGradient>
        <filter id="lightGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="glow1" />
            <feMerge><feMergeNode in="glow1" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    <!-- Apenas a linha fina (56px) com Drop-Glow suave, sem a aura grossa -->
    <g filter="url(#lightGlow)">
        <path d="M 160 360 L 160 140 L 340 360 L 340 225 M 340 139 L 340 141" fill="none" stroke="url(#neonGrad)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
    </g>
</svg>
