<!-- Arquivo: nexa_logo_vertical_dark_transp.svg | Função: Proporção "Hero" com Gap Corrigido (Transparente) -->
<svg viewBox="0 0 300 270" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f02bd4" /> <stop offset="50%" stop-color="#8b5cf6" /> <stop offset="100%" stop-color="#00d4ff" /> 
        </linearGradient>
        <linearGradient id="borderGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffb3f3" /> <stop offset="50%" stop-color="#cfaeff" /> <stop offset="100%" stop-color="#a8e5ff" /> 
        </linearGradient>
        <filter id="trueGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="glow1" />
            <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="glow2" />
            <feMerge result="glow_merged"><feMergeNode in="glow1" /><feMergeNode in="glow2" /></feMerge>
            <feMerge><feMergeNode in="glow_merged" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
        <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="tGlow1" />
            <feMerge><feMergeNode in="tGlow1" /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>
    <svg x="60" y="10" width="180" height="180" viewBox="0 0 500 500">
        <g filter="url(#trueGlow)">
            <path d="M 160 360 L 160 140 L 340 360 L 340 225 M 340 139 L 340 141" fill="none" stroke="url(#borderGrad)" stroke-width="70" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M 160 360 L 160 140 L 340 360 L 340 225 M 340 139 L 340 141" fill="none" stroke="url(#neonGrad)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </svg>
    <g transform="translate(29, 155) scale(1.1)">
        <path d="M 0,60 L 0,20 L 12,20 L 36,50 L 36,20 L 48,20 L 48,60 L 36,60 L 12,30 L 12,60 Z" fill="#FFFFFF"/>
        <path d="M 68,60 L 68,20 L 103,20 L 103,29 L 81,29 L 81,35 L 99,35 L 99,44 L 81,44 L 81,51 L 103,51 L 103,60 Z" fill="#FFFFFF"/>
        <path d="M 118,20 L 132,20 L 158,60 L 144,60 Z" fill="#FFFFFF"/>
        <path d="M 118,60 L 132,60 L 158,20 L 144,20 Z" fill="url(#neonGrad)" filter="url(#textGlow)"/>
        <path d="M 186,20 L 200,20 L 224,60 L 209,60 L 193,31 L 177,60 L 162,60 Z" fill="#FFFFFF"/>
    </g>
</svg>
